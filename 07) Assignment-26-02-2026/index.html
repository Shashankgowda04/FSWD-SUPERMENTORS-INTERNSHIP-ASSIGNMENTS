<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Builder: Guessing Game</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f4; }
        .game-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 60px; font-size: 1.2rem; margin: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
        #message { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="game-card">
        <h1>Number Guessing Game</h1>
        <p>I'm thinking of a number between 1 and 100.</p>
        
        <input type="number" id="userGuess" placeholder="0">
        <button id="guessBtn">Guess!</button>
        <button id="resetBtn" style="display:none; background: #2ecc71;">Play Again</button>

        <div id="message"></div>
        <p>Attempts: <span id="attemptCount">0</span></p>
    </div>

    <script src="app.js"></script>
</body>
</html>
